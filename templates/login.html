<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访问验证</title>
    <link href="/static/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/vendor/fontawesome/css/all.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at top left, rgba(138, 182, 214, 0.28), transparent 36%),
                radial-gradient(circle at bottom right, rgba(149, 213, 178, 0.24), transparent 28%),
                linear-gradient(135deg, #f5f7fa 0%, #eef2f6 100%);
        }

        .login-shell {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            border: 1px solid rgba(73, 80, 87, 0.12);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
        }

        .login-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #495057;
            color: #fff;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>
    <div class="login-shell">
        <div class="login-card p-4 p-md-5">
            <div class="text-center mb-4">
                <div class="login-icon mb-3">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h1 class="h4 mb-2">系统访问验证</h1>
                <p class="text-muted mb-0">请输入访问密码后继续使用功能。</p>
            </div>

            {% if error %}
            <div class="alert alert-danger" role="alert">{{ error }}</div>
            {% endif %}

            <form method="post" action="/login">
                <input type="hidden" name="next" value="{{ next_path }}">
                <div class="mb-3">
                    <label for="password" class="form-label">访问密码</label>
                    <input type="password" class="form-control form-control-lg" id="password" name="password"
                        placeholder="Password" autocomplete="current-password" required autofocus>
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-lg">
                    <i class="fas fa-arrow-right-to-bracket me-2"></i>进入系统
                </button>
            </form>
        </div>
    </div>

    <script src="/static/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
